name: high_noise
seed: 43

output:
  dir: results/high_noise

field:
  xlim: [0.0, 200.0]
  ylim: [0.0, 200.0]
  zlim: [0.0, 10.0]
  n_trees: 80

plants:
  leaves_per_tree: [120, 220]
  height_range: [2.0, 3.0]
  canopy_base_frac: [0.60, 0.80]
  min_canopy_clearance: 1.0
  crown_radius_xy: [4.5, 5.0]
  shape_power: [1.7, 2.3]
  lobes: [1, 3]
  leaf_jitter: 0.18

disease:
  initial_infected_trees: 4
  spread_radius: 20.0
  steps: 2
  base_probability: 0.22
  height_bias: 0.12

simulation:
  dt: 0.1
  duration_s: 60.0

uav:
  initial_state: [100.0, 100.0, 0.0]
  initial_estimate_error: [0.8, -0.8, 0.1221730476]
  initial_covariance: [1.5, 1.5, 0.2617993878]
  gps_hz: 1.0
  v_nom: 4.0
  w_max_deg: 60.0
  kp_ang: 1.6
  kp_dist: 0.6
  waypoint_tolerance: 3.0
  waypoints:
    - [20.0, 20.0]
    - [180.0, 20.0]
    - [180.0, 180.0]
    - [20.0, 180.0]

ugv:
  count: 2
  duration_s: 50.0
  v_nom: 1.0
  w_max_deg: 60.0
  kp_ang: 1.4
  kp_dist: 0.5
  obstacle_radius_m: 6.0
  obstacle_gain: 0.9

noise:
  sigma_gps_m: 1.8
  sigma_gyro_deg: 4.0
  sigma_vcmd: 0.3
  sigma_omega_deg: 5.0

camera:
  sensor_width_mm: 36.0
  sensor_height_mm: 24.0
  focal_mm: 12.0
  fstop_N: 4.0
  coc_mm: 0.03
  altitude_m: 7.0
  pitch_deg: 80.0
  roll_deg: 0.0
  range_min_m: 1.0
  range_max_m: 16.0

heatmap:
  resolution_m: 5.0
  sigma_m: 10.0
  target_min_separation_m: 15.0
